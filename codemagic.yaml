  ios-testflight:
    name: iOS → TestFlight
    max_build_duration: 60
    environment:
      vars:
        EXPO_PUBLIC_SUPABASE_URL: https://zippqumynxivnhhmvblc.supabase.co
        EXPO_PUBLIC_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppcHBxdW15bnhpdm5oaG12YmxjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NTczMzcsImV4cCI6MjA5MTIzMzMzN30.jufKA4yHSshCyM-D1Xxa_hBfXTox4ErtpoEo0yXW6QE
        EXPO_PUBLIC_EAS_PROJECT_ID: abdbb665-1d8f-4924-9174-863608ab17b5
      groups:
        - playthread
      node: 22.14.0
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Expo prebuild
        script: |
          npx expo prebuild --clean --platform ios
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Set build number
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-testflight-build-number 6762104334) + 1))
          echo "Setting build number to $BUILD_NUMBER"
          cd ios && agvtool new-version -all $BUILD_NUMBER
      - name: Set up keychain
        script: keychain initialize
      - name: Import certificate and provisioning profile
        script: |
          echo "CERTIFICATE_P12 length: ${#CERTIFICATE_P12}"
          echo "PROVISIONING_PROFILE length: ${#PROVISIONING_PROFILE}"
          echo "$CERTIFICATE_P12" | tr -d ' \n\r' | base64 --decode > /tmp/certificate.p12
          keychain add-certificates --certificate /tmp/certificate.p12 --certificate-password "$CERTIFICATE_PASSWORD"
          echo "$PROVISIONING_PROFILE" | tr -d ' \n\r' | base64 --decode > /tmp/profile.mobileprovision
          echo "Decoded profile size: $(wc -c < /tmp/profile.mobileprovision) bytes"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp /tmp/profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          WORKSPACE_PATH="$(find ios -maxdepth 1 -name '*.xcworkspace' | head -n 1)"
          PROJECT_PATH="$(find ios -maxdepth 1 -name '*.xcodeproj' | head -n 1)"

          if [ -n "$WORKSPACE_PATH" ]; then
            SCHEME_NAME="$(basename "$WORKSPACE_PATH" .xcworkspace)"
            echo "Using workspace: $WORKSPACE_PATH"
            echo "Using scheme: $SCHEME_NAME"
            xcode-project build-ipa \
              --workspace "$WORKSPACE_PATH" \
              --scheme "$SCHEME_NAME"
          elif [ -n "$PROJECT_PATH" ]; then
            echo "No workspace found after pod install."
            ls -la ios || true
            exit 1
          else
            echo "No Xcode workspace or project found under ios/ after Expo prebuild."
            ls -la ios || true
            exit 1
          fi
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
